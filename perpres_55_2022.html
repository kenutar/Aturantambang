<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Perpres No. 55 Tahun 2022 — Pendelegasian Perizinan Pertambangan Minerba</title>
<style>

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0c0f14;
    --surface: rgba(255,255,255,0.028);
    --surface2: rgba(255,255,255,0.05);
    --border: rgba(255,255,255,0.07);
    --text: #cdd5e0;
    --muted: #3d4f62;
    --muted2: #5a7080;
    --bab-color: #0f3460;
    --bab-accent: #4f9cf9;
  }

  body {

    font-family: 'Geist', sans-serif;
    color: var(--text);
    min-height: 100vh;
    transition: background 0.5s ease;
  }

  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }

  @keyframes fadeUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
  @keyframes blink { 0%,100%{opacity:0.25} 50%{opacity:1} }

  .fade-up { animation: fadeUp 0.28s ease forwards; }
  input, textarea { outline: none; font-family: inherit; }
  button { cursor: pointer; font-family: inherit; transition: opacity .15s, transform .1s; }
  button:hover { opacity: 0.82; }
  button:active { transform: scale(0.97); }

  /* ── Header ── */

  .logo-badge {

    border: 1px solid rgba(79,156,249,0.2);

  .logo-seal { font-size: 16px; }
  .logo-text-top { font-size: 9px; font-weight: 700; color: #4f9cf9; letter-spacing: 0.09em; font-family:'Geist Mono',monospace; line-height:1.1; }

  .header-title { flex: 1; }

  .header-title p { font-size:9.5px; color:var(--muted); margin-top:2px; font-family:'Geist Mono',monospace; }
  .tabs { display: flex; gap: 3px; }

    display: flex; align-items: center; gap: 5px; transition: all .16s;
  }
  .tab-btn.active {
    background: color-mix(in srgb,var(--bab-color) 25%,transparent);
    border-color: color-mix(in srgb,var(--bab-accent) 30%,transparent);
    color: var(--bab-accent); font-weight: 600;
  }

  /* ── Layout ── */
  .layout {
    max-width: 1320px; margin: 0 auto;
    padding: 20px 24px; display: flex; gap: 18px; align-items: flex-start;

  /* ── Sidebar ── */
  aside { width: 238px; flex-shrink: 0; position: sticky; top: 72px; }
  .sidebar-label {

    font-family: 'Geist Mono', monospace;
  }
  .sidebar-list { display: flex; flex-direction: column; gap: 4px; }
  .bab-btn {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 9px; padding: 9px 11px; text-align: left;
    position: relative; overflow: hidden; width: 100%; transition: all .18s;
  }
  .bab-btn.active {
    background: linear-gradient(135deg,
      color-mix(in srgb,var(--bab-color) 20%,transparent),
      color-mix(in srgb,var(--bab-color) 10%,transparent));
    border-color: color-mix(in srgb,var(--bab-accent) 28%,transparent);
  }
  .bab-indicator {
    position: absolute; left: 0; top: 0; width: 3px; height: 100%;
    border-radius: 3px 0 0 3px; display: none;
  }
  .bab-btn.active .bab-indicator { display: block; }
  .bab-inner { display: flex; align-items: center; gap: 9px; }
  .bab-icon { font-size: 15px; line-height: 1; flex-shrink: 0; }
  .bab-meta { flex: 1; min-width: 0; }
  .bab-num {
    font-size: 8.5px; font-weight: 700; letter-spacing: 0.09em;
    text-transform: uppercase; margin-bottom: 1px;
    color: var(--muted); font-family: 'Geist Mono', monospace;
  }
  .bab-btn.active .bab-num { color: var(--bab-accent); }
  .bab-short {
    font-size: 11.5px; font-weight: 500; color: #3d5060;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .bab-btn.active .bab-short { color: #d0dff0; }

  /* ── Main ── */
  main { flex: 1; min-width: 0; }

  /* ── Hero card ── */
  .hero-card {
    border-radius: 14px; padding: 26px 28px; margin-bottom: 16px;
    position: relative; overflow: hidden; border: 1px solid;
  }
  .hero-bg-icon {
    position: absolute; right: 20px; top: 50%; transform: translateY(-50%);
    font-size: 88px; opacity: 0.06; user-select: none; pointer-events: none;
  }
  .hero-badge {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 3px 9px; border-radius: 20px; font-size: 10px;
    font-weight: 700; letter-spacing: 0.09em; text-transform: uppercase;
    margin-bottom: 11px; border: 1px solid;
    font-family: 'Geist Mono', monospace;
  }
  .hero-card h2 {
    font-family: 'Instrument Serif', serif;
    font-size: 20px; font-weight: 400; color: #ecf2fb;
    line-height: 1.4; margin-bottom: 8px; max-width: 540px;
  }
  .hero-subtitle { font-size: 13px; color: var(--muted2); line-height: 1.6; max-width: 520px; }

  /* ── Info grid ── */
  .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
  .info-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 11px; padding: 14px 16px;
  }
  .info-card-label {
    font-size: 8.5px; font-weight: 700; letter-spacing: 0.13em;
    color: var(--muted); text-transform: uppercase; margin-bottom: 9px;
    font-family: 'Geist Mono', monospace;
  }
  .tag {
    display: inline-block; padding: 2px 8px; border-radius: 20px;
    font-size: 10.5px; font-weight: 500; margin-right: 5px; margin-bottom: 5px;
    border: 1px solid;
  }

  /* ── Pasal notes panel ── */
  .pasal-panel {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 11px; padding: 16px 18px;

  .pasal-list { display: flex; flex-direction: column; gap: 5px; }
  .pasal-row {

    border: 1px solid rgba(255,255,255,0.065);

  .pasal-row-top { display: flex; align-items: stretch; }
  .pasal-btn {

    color: var(--muted2); font-size: 12px; font-weight: 400;
    display: flex; align-items: center; gap: 8px; transition: all .16s;
  }
  .pasal-btn:hover { background: rgba(255,255,255,0.04); color: #8aaac0; }
  .pasal-btn.active {
    background: color-mix(in srgb,var(--bab-color) 20%,transparent);
    color: #cde0f4; font-weight: 500;
  }
  .pasal-num {
    font-family: 'Geist Mono', monospace; font-size: 9px; font-weight: 600;
    min-width: 22px; text-align: center; opacity: 0.45;
  }
  .pasal-btn.active .pasal-num { opacity: 1; color: var(--bab-accent); }
  .pasal-note-btn {
    background: rgba(255,255,255,0.035);
    border: none; border-left: 1px solid rgba(255,255,255,0.055);
    color: var(--muted); padding: 0 12px;
    font-size: 10.5px; font-weight: 600; white-space: nowrap;
    transition: all .16s; flex-shrink: 0;
  }
  .pasal-note-btn:hover {
    background: color-mix(in srgb,var(--bab-accent) 14%,transparent);
    color: var(--bab-accent);
  }
  .pasal-note-btn.has-note { color: var(--bab-accent); opacity: 0.8; }

  /* ── Inline editor ── */
  .pasal-editor {
    border-top: 1px solid rgba(255,255,255,0.055);
    background: rgba(0,0,0,0.2);
    animation: fadeUp 0.18s ease forwards;
  }
  .pasal-editor-head {
    display: flex; align-items: center; justify-content: space-between;
    padding: 7px 12px 5px;
  }
  .pasal-editor-title {
    font-size: 8.5px; font-weight: 700; letter-spacing: 0.12em;
    text-transform: uppercase; font-family: 'Geist Mono', monospace;
  }
  .pasal-editor-actions { display: flex; gap: 5px; align-items: center; }
  .pasal-save-btn {
    font-size: 10.5px; font-weight: 700; padding: 3px 11px;
    border-radius: 5px; border: none; color: #fff; transition: opacity .15s;
  }
  .pasal-save-btn:disabled { opacity: 0.35; }
  .pasal-close-btn {
    background: none; border: none; color: var(--muted);
    font-size: 12px; line-height: 1; padding: 2px 5px;
  }
  .pasal-close-btn:hover { color: #8aaac0; }
  .saved-indicator {
    font-size: 9.5px; font-weight: 700; font-family: 'Geist Mono', monospace;
    opacity: 0; transition: opacity .3s;
  }
  .saved-indicator.show { opacity: 1; }
  .pasal-textarea {
    width: 100%; background: transparent; border: none;
    color: #c0d0e0; font-size: 12.5px; line-height: 1.72;
    font-family: 'Geist', sans-serif;
    resize: vertical; min-height: 85px;
    padding: 0 12px 10px; outline: none;
  }
  .pasal-textarea::placeholder { color: #1e2d3d; }

  /* ── Detail ── */
  .detail-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 11px; padding: 22px 26px;
  }
  .detail-label {
    font-size: 8.5px; font-weight: 700; letter-spacing: 0.13em;
    text-transform: uppercase; margin-bottom: 7px; font-family: 'Geist Mono', monospace;
  }
  .detail-title {
    font-family: 'Instrument Serif', serif; font-size: 15px; font-weight: 400;
    color: #d8e8f8; line-height: 1.5; margin-bottom: 16px;
  }
  .detail-body {
    white-space: pre-wrap; font-family: 'Geist Mono', monospace;
    font-size: 12px; line-height: 1.88; color: #4d6878;
    max-height: 65vh; overflow-y: auto;
    border-top: 1px solid var(--border); padding-top: 14px; padding-right: 5px;
  }

  /* ── Search ── */
  .search-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 11px; padding: 22px 26px;
  }
  .search-label {
    font-size: 8.5px; font-weight: 700; color: var(--muted); letter-spacing: 0.13em;
    text-transform: uppercase; margin-bottom: 14px; font-family: 'Geist Mono', monospace;
  }
  .scope-row { display: flex; gap: 7px; margin-bottom: 11px; }
  .scope-btn {
    background: rgba(255,255,255,0.035); border: 1px solid rgba(255,255,255,0.07);
    color: var(--muted); padding: 5px 13px; border-radius: 7px; font-size: 11.5px; transition: all .16s;
  }
  .scope-btn.active {
    background: color-mix(in srgb,var(--bab-accent) 12%,transparent);
    border-color: color-mix(in srgb,var(--bab-accent) 32%,transparent);
    color: var(--bab-accent); font-weight: 600;
  }
  .search-row { display: flex; gap: 9px; margin-bottom: 11px; }
  .search-input {
    flex: 1; background: rgba(255,255,255,0.045);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 9px; padding: 9px 14px; color: #d0dff0; font-size: 13px;
  }
  .search-btn {
    background: linear-gradient(135deg,#0f3460,#1a4a80);
    border: none; color: #fff; padding: 9px 18px;
    border-radius: 9px; font-size: 12.5px; font-weight: 600;
  }
  .search-btn:disabled { background: rgba(255,255,255,0.06); color: var(--muted); }
  .chips-wrap { display: flex; flex-wrap: wrap; gap: 6px; }
  .chip {
    background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.07);
    color: var(--muted); padding: 4px 11px; border-radius: 20px; font-size: 11px;
  }
  .chip:hover { border-color: rgba(79,156,249,0.3); color: #6aabdb; }

  /* ── AI box ── */
  .ai-box {
    margin-top: 14px; background: rgba(6,10,18,0.7);
    border-radius: 10px; overflow: hidden; border: 1px solid;
    animation: fadeUp 0.25s ease forwards;

  .ai-box-header {
    padding: 7px 13px; border-bottom: 1px solid;
    display: flex; align-items: center; gap: 7px;
    font-size: 9.5px; font-weight: 700; letter-spacing: 0.09em;
    text-transform: uppercase; font-family: 'Geist Mono', monospace;
  }
  .ai-box-body {
    padding: 13px 15px; font-size: 13px; line-height: 1.8;
    color: #b0c4d8; white-space: pre-wrap;

  /* ── Spin ── */
  .spin {
    display: inline-block; width: 12px; height: 12px; border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.12);
    border-top-color: var(--bab-accent);
    animation: spin 0.65s linear infinite; vertical-align: middle;
  }

  /* ── Chat ── */
  .chat-wrap {
    display: flex; flex-direction: column;
    height: calc(100vh - 155px); min-height: 500px;
  }
  .chat-context-bar {
    border-radius: 9px; padding: 8px 13px;
    display: flex; align-items: center; gap: 9px;
    margin-bottom: 11px; flex-shrink: 0; border: 1px solid;

  .chat-context-title { font-size: 11px; font-weight: 600; }
  .chat-context-hint { font-size: 10px; color: var(--muted); }
  .chat-messages {
    flex: 1; overflow-y: auto;
    display: flex; flex-direction: column; gap: 11px;

  .chat-empty { padding: 26px 8px; text-align: center; }
  .chat-empty-icon { font-size: 36px; margin-bottom: 12px; }
  .chat-empty-title {

  .starters-wrap { display: flex; flex-wrap: wrap; gap: 7px; justify-content: center; }
  .starter-btn {
    background: rgba(255,255,255,0.035); border: 1px solid rgba(255,255,255,0.07);
    color: var(--muted2); padding: 7px 13px; border-radius: 20px; font-size: 12px;

  .msg { display: flex; }
  .msg.user { justify-content: flex-end; }
  .msg.assistant { justify-content: flex-start; }
  .bubble {
    max-width: 82%; border: 1px solid; padding: 10px 13px;
    font-size: 13px; line-height: 1.7; white-space: pre-wrap;
  }
  .bubble.user { border-radius: 13px 13px 3px 13px; color: #d0e4f8; }
  .bubble.assistant {
    border-radius: 13px 13px 13px 3px;
    background: rgba(255,255,255,0.035); border-color: rgba(255,255,255,0.07);
    color: #a8c0d4;
  }
  .bubble-label {
    font-size: 8.5px; font-weight: 700; letter-spacing: 0.09em;
    margin-bottom: 4px; font-family: 'Geist Mono', monospace;
  }
  .dots-wrap { display: flex; gap: 5px; padding-left: 5px; align-items: center; }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--bab-accent); }
  .dot:nth-child(1){animation:blink 1s 0s infinite;}
  .dot:nth-child(2){animation:blink 1s .18s infinite;}
  .dot:nth-child(3){animation:blink 1s .36s infinite;}
  .chat-input-wrap {
    display: flex; gap: 9px;
    background: rgba(255,255,255,0.025); border: 1px solid rgba(255,255,255,0.07);
    border-radius: 11px; padding: 7px 7px 7px 13px;
    align-items: flex-end; flex-shrink: 0;
  }
  .chat-textarea {
    flex: 1; background: transparent; border: none;
    color: #ccdbe8; font-size: 13px; resize: none; line-height: 1.55;
  }
  .send-btn {
    width: 36px; height: 36px; border-radius: 7px; border: none;
    font-size: 16px; display: flex; align-items: center;
    justify-content: center; flex-shrink: 0;
    background: rgba(255,255,255,0.04); color: var(--muted);
    transition: all .2s;
  }
  .send-btn.ready { color: #fff; }

  @media (max-width: 880px) {
    .layout { flex-direction: column; }
    aside { width: 100%; position: static; }
    .sidebar-list { flex-direction: row; flex-wrap: wrap; }
    .bab-btn { width: auto; }
    .info-grid { grid-template-columns: 1fr; }
    .tabs { display: none; }
  }
</style>
</head>

async function callClaude(msgs, system) {
  const r = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ model:"claude-sonnet-4-20250514", max_tokens:1000, system: system || BASE_SYSTEM, messages: msgs })

  const d = await r.json();
  if (d.error) throw new Error(d.error.message);
  return d.content?.[0]?.text || "";
}

// ─── Tab nav ──────────────────────────────────────────────────────────────────
function renderTabs() {
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.tab === state.tab);
  });
}

// ─── Overview ─────────────────────────────────────────────────────────────────
function renderOverview() {
  const b = state.bab;
  const sel = state.selectedPasal;

  const pasalsHtml = b.pasals.map(p => {
    const num = p.split('—')[0].trim();
    const label = (p.split('—')[1] || '').trim();
    const active = sel === p;
    const note = getNote(b.id, p);
    const hasNote = note.length > 0;

    const editorHtml = active ? `
      <div class="pasal-editor">
        <div class="pasal-editor-head">
          <div class="pasal-editor-title" style="color:${b.accent}">✎ Catatan — ${escHtml(p)}</div>
          <div class="pasal-editor-actions">
            <span class="saved-indicator" id="saved-${escHtml(num.replace(/\s/g,''))}" style="color:${b.accent}">✓ Tersimpan</span>
            <button class="pasal-save-btn"
              data-pasal="${escHtml(p)}" data-num="${escHtml(num.replace(/\s/g,''))}"
              style="background:linear-gradient(135deg,${b.color},${b.color}bb)">
              💾 Simpan
            </button>
            <button class="pasal-close-btn" data-close-pasal="${escHtml(p)}">✕</button>
          </div>
        </div>
        <textarea class="pasal-textarea" id="note-${escHtml(num.replace(/\s/g,''))}"
          placeholder="Tuliskan catatan, analisis, implikasi, atau anotasi untuk ${escHtml(num)}…"
          data-pasal="${escHtml(p)}"
        >${escHtml(note)}</textarea>
      </div>` : '';

    return `<div class="pasal-row${active?' active':''}">
      <div class="pasal-row-top">
        <button class="pasal-btn${active?' active':''}" data-pasal="${escHtml(p)}">
          <span class="pasal-num" style="${active?`color:${b.accent}`:''}">
            ${escHtml(num.replace('Pasal ','§'))}
          </span>
          <span>${escHtml(label || num)}</span>
          ${hasNote && !active ? `<span style="margin-left:auto;font-size:10px;color:${b.accent};opacity:0.75" title="Ada catatan">📝</span>` : ''}
        </button>
        <button class="pasal-note-btn${hasNote?' has-note':''}" data-note-pasal="${escHtml(p)}"
          title="${hasNote ? 'Edit catatan' : 'Tambah catatan'}">
          ${hasNote ? '📝 Edit' : '✎ Catat'}
        </button>
      </div>
      ${editorHtml}
    </div>`;
  }).join('');

  return `<div class="fade-up">
    <div class="hero-card" style="background:linear-gradient(145deg,${b.color}28,${b.color}0e);border-color:${b.color}38">
      <div class="hero-bg-icon">${b.icon}</div>
      <div class="hero-badge" style="background:${b.color}28;color:${b.accent};border-color:${b.accent}38">
        ${b.icon} BAB ${b.id} &nbsp;·&nbsp; ${b.pages}
      </div>
      <h2>${b.title}</h2>
      <p class="hero-subtitle">${b.subtitle}</p>
    </div>

    <div class="info-grid">
      <div class="info-card">
        <div class="info-card-label">Kata Kunci</div>
        <div>${b.keywords.map(k => tagHTML(k,'#4a7090')).join('')}</div>
      </div>
      <div class="info-card" style="display:flex;flex-direction:column;justify-content:center;">
        <div class="info-card-label">Tentang BAB Ini</div>
        <p style="font-size:12.5px;color:var(--muted2);line-height:1.65">${b.subtitle}</p>
        <p style="font-size:10.5px;color:var(--muted);margin-top:6px;font-family:'Geist Mono',monospace">${b.pages}</p>
      </div>
    </div>

    <div class="pasal-panel">
      <div class="pasal-panel-label">§ Daftar Pasal — Klik ✎ Catat untuk anotasi</div>
      <div class="pasal-list">${pasalsHtml}</div>
    </div>
  </div>`;
}

// ─── Detail ───────────────────────────────────────────────────────────────────
function renderDetail() {
  const b = state.bab;
  return `<div class="fade-up">
    <div class="detail-card">
      <div class="detail-label" style="color:${b.accent}">BAB ${b.id} · Teks Lengkap</div>
      <h2 class="detail-title">${b.title}</h2>
      <div class="detail-body">${escHtml(TEXTS[b.id])}</div>
    </div>
  </div>`;
}

// ─── Search ───────────────────────────────────────────────────────────────────
const CHIPS = ["Syarat IUP Provinsi","Kewenangan Gubernur","Inspektur Tambang","Sanksi Pelanggaran","Sumber Dana APBD","IUJP Delegasi","Laporan ke Menteri","Batas 12 Mil Laut"];
let searchState = { result: null, loading: false, q: '' };

function renderSearch() {
  const b = state.bab;
  return `<div class="fade-up">
    <div class="search-card">
      <div class="search-label">🔍 Pencarian Cerdas</div>
      <div class="scope-row">
        <button class="scope-btn${state.searchScope==='all'?' active':''}" data-scope="all">Seluruh Dokumen</button>
        <button class="scope-btn${state.searchScope==='current'?' active':''}" data-scope="current">BAB ${b.id} Saja</button>
      </div>
      <div class="search-row">
        <input class="search-input" id="search-input"
          placeholder="Cari ketentuan, pasal, atau istilah… (tekan Enter)"
          value="${escHtml(searchState.q)}" />
        <button class="search-btn" id="search-go" ${searchState.loading?'disabled':''}>
          ${searchState.loading ? spinnerHTML('#fff') : 'Cari'}
        </button>
      </div>
      <div class="chips-wrap">
        ${CHIPS.map(c => `<button class="chip" data-chip="${escHtml(c)}">${c}</button>`).join('')}
      </div>
      ${aiBoxHTML(searchState.result, searchState.loading, b.accent)}
    </div>
  </div>`;
}

async function runSearch(q) {
  if (!q.trim()) return;
  searchState = { ...searchState, q, result: null, loading: true };
  renderMain();
  const b = state.bab;
  try {
    const ctx = state.searchScope === 'current'
      ? `=== BAB ${b.id}: ${b.shortTitle} ===\n${TEXTS[b.id]}`
      : Object.entries(TEXTS).map(([id,t]) => `=== BAB ${id}: ${BABS.find(x=>x.id===id).shortTitle} ===\n${t}`).join('\n\n');
    const ans = await callClaude([{role:'user',content:
      `Kamu adalah ahli hukum pertambangan Indonesia. Berikut teks resmi Perpres No. 55 Tahun 2022.\n\nPERTANYAAN: "${q}"\n\nTEKS PERPRES 55/2022:\n${ctx.slice(0,9000)}\n\nJawab berdasarkan teks dokumen, mencakup: (1) BAB/Pasal yang relevan, (2) Isi ketentuan, (3) Implikasi/kewajiban yang harus dipenuhi.`
    }]);
    searchState = { ...searchState, result: ans, loading: false };
  } catch(e) {
    searchState = { ...searchState, result: `Error: ${e.message}`, loading: false };
  }
  renderMain();
}

// ─── Chat ─────────────────────────────────────────────────────────────────────
function renderChat() {
  const b = state.bab;
  const STARTERS = [
    "Apa inti dari BAB ini?",
    "Apa kewajiban utama Pemerintah Daerah?",
    "Siapa yang berwenang mengeluarkan izin ini?",
    "Apa sanksi jika terjadi pelanggaran?"
  ];
  const msgsHtml = state.chatMsgs.map(m => `
    <div class="msg ${m.role}">
      <div class="bubble ${m.role}" style="${m.role==='user'?`background:linear-gradient(135deg,${b.color}55,${b.color}33);border-color:${b.color}44`:''}">
        ${m.role==='assistant' ? `<div class="bubble-label" style="color:${b.accent}">✦ AI ASISTEN</div>` : ''}
        ${escHtml(m.content)}
      </div>
    </div>`).join('');

  return `<div class="chat-wrap fade-up">
    <div class="chat-context-bar" style="background:${b.color}18;border-color:${b.color}28">
      <span style="font-size:16px">${b.icon}</span>
      <div>
        <div class="chat-context-title" style="color:${b.accent}">Konteks: BAB ${b.id} — ${b.shortTitle}</div>
        <div class="chat-context-hint">Pilih BAB lain di sidebar untuk mengubah konteks</div>
      </div>
    </div>
    <div class="chat-messages" id="chat-msgs">
      ${state.chatMsgs.length === 0 ? `<div class="chat-empty">
        <div class="chat-empty-icon">⚖️</div>
        <div class="chat-empty-title">Tanya tentang ${b.shortTitle}</div>
        <div class="chat-empty-hint">AI akan menjawab berdasarkan isi BAB ${b.id} Perpres 55/2022</div>
        <div class="starters-wrap">
          ${STARTERS.map(s => `<button class="starter-btn" data-starter="${escHtml(s)}">${s}</button>`).join('')}
        </div>
      </div>` : msgsHtml}
      ${state.chatLoading ? `<div class="dots-wrap"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>` : ''}
      <div id="chat-end"></div>
    </div>
    <div class="chat-input-wrap">
      <textarea class="chat-textarea" id="chat-input" rows="2"
        placeholder="Tanya tentang BAB ${b.id}… (Enter kirim)"></textarea>
      <button class="send-btn" id="send-btn" style="background:linear-gradient(135deg,${b.color},${b.color}99)">↑</button>
    </div>
  </div>`;
}

async function sendChat(text) {
  if (!text.trim() || state.chatLoading) return;
  const b = state.bab;
  state.chatMsgs = [...state.chatMsgs, { role:'user', content:text }];
  state.chatLoading = true;
  renderMain();
  scrollChatEnd();
  try {
    const sys = `${BASE_SYSTEM}\n\nKonteks aktif: BAB ${b.id} — ${b.shortTitle}.\n\nTeks resmi BAB ${b.id} Perpres 55/2022:\n${TEXTS[b.id]}`;
    const reply = await callClaude(state.chatMsgs.slice(-8), sys);
    state.chatMsgs = [...state.chatMsgs, { role:'assistant', content:reply }];
  } catch(e) {
    state.chatMsgs = [...state.chatMsgs, { role:'assistant', content:`⚠️ Error: ${e.message}` }];
  }
  state.chatLoading = false;
  renderMain();
  scrollChatEnd();
}

function scrollChatEnd() {
  setTimeout(() => document.getElementById('chat-end')?.scrollIntoView({ behavior:'smooth' }), 50);
}

// ─── Render ───────────────────────────────────────────────────────────────────
function renderMain() {
  const panel = document.getElementById('main-panel');
  if (state.tab === 'overview') panel.innerHTML = renderOverview();
  else if (state.tab === 'detail') panel.innerHTML = renderDetail();
  else if (state.tab === 'search') panel.innerHTML = renderSearch();
  else if (state.tab === 'chat') panel.innerHTML = renderChat();
  attachPanelEvents();
}

function render() {
  applyBabTheme(state.bab);
  renderSidebar();
  renderTabs();
  renderMain();
}

function attachPanelEvents() {
  // Overview — pasal name click toggle
  document.querySelectorAll('.pasal-btn').forEach(b => {
    b.addEventListener('click', () => {
      const p = b.dataset.pasal;
      state.selectedPasal = state.selectedPasal === p ? null : p;
      renderMain();
    });
  });

  // Overview — ✎ Catat button
  document.querySelectorAll('.pasal-note-btn').forEach(b => {
    b.addEventListener('click', () => {
      const p = b.dataset.notePasal;
      state.selectedPasal = state.selectedPasal === p ? null : p;
      renderMain();
      if (state.selectedPasal === p) {
        setTimeout(() => {
          const num = p.split('—')[0].trim().replace(/\s/g,'');
          document.getElementById(`note-${num}`)?.focus();
        }, 50);
      }
    });
  });

  // Close editor
  document.querySelectorAll('[data-close-pasal]').forEach(b => {
    b.addEventListener('click', () => { state.selectedPasal = null; renderMain(); });
  });

  // Save button
  document.querySelectorAll('.pasal-save-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const pasal = btn.dataset.pasal;
      const num   = btn.dataset.num;
      const ta = document.getElementById(`note-${num}`);
      if (!ta) return;
      saveNote(state.bab.id, pasal, ta.value);
      const ind = document.getElementById(`saved-${num}`);
      if (ind) { ind.classList.add('show'); setTimeout(() => ind.classList.remove('show'), 2000); }
      state.selectedPasal = pasal;
      renderMain();
    });
  });

  // Ctrl+S shortcut
  document.querySelectorAll('.pasal-textarea').forEach(ta => {
    ta.addEventListener('keydown', e => {
      if ((e.ctrlKey || e.metaKey) && e.key === 's') {
        e.preventDefault();
        const pasal = ta.dataset.pasal;
        const num = pasal.split('—')[0].trim().replace(/\s/g,'');
        saveNote(state.bab.id, pasal, ta.value);
        const ind = document.getElementById(`saved-${num}`);
        if (ind) { ind.classList.add('show'); setTimeout(() => ind.classList.remove('show'), 2000); }
      }
    });
  });

  // Search
  document.querySelectorAll('.scope-btn').forEach(b => {
    b.addEventListener('click', () => { state.searchScope = b.dataset.scope; renderMain(); });
  });
  const si = document.getElementById('search-input');
  if (si) si.addEventListener('keydown', e => { if(e.key==='Enter') runSearch(si.value); });
  document.getElementById('search-go')?.addEventListener('click', () => runSearch(si?.value||''));
  document.querySelectorAll('.chip').forEach(c => {
    c.addEventListener('click', () => { searchState.q = c.dataset.chip; runSearch(c.dataset.chip); });
  });

  // Chat
  const ci = document.getElementById('chat-input');
  const sb = document.getElementById('send-btn');
  if (ci) {
    ci.addEventListener('keydown', e => {
      if(e.key==='Enter' && !e.shiftKey) { e.preventDefault(); sendChat(ci.value); ci.value = ''; }
    });
    ci.addEventListener('input', () => {
      if(sb) sb.className = 'send-btn' + (ci.value.trim() ? ' ready' : '');
    });
  }
  sb?.addEventListener('click', () => { sendChat(ci?.value||''); if(ci) ci.value = ''; });
  document.querySelectorAll('.starter-btn').forEach(b => {
    b.addEventListener('click', () => sendChat(b.dataset.starter));
  });

  if (state.tab === 'chat') scrollChatEnd();
}

// ─── Actions ──────────────────────────────────────────────────────────────────
function pickBab(b) {
  state.bab = b;
  state.selectedPasal = null;
  render();
}

document.getElementById('tabs').addEventListener('click', e => {
  const btn = e.target.closest('.tab-btn');
  if (btn) { state.tab = btn.dataset.tab; renderTabs(); renderMain(); }
});

// ─── Boot ─────────────────────────────────────────────────────────────────────
render();
</script>
</html>
